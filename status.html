<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081120;
color:#fff;
}

.header{
background:#10213d;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{

background:#132544;
border-radius:16px;
padding:18px;
margin-bottom:18px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,.35);

}

.card:hover{

background:#1b3560;

}

.title{

font-size:18px;
font-weight:bold;

}

.arrow{

font-size:24px;
color:#FFD700;

}

</style>

</head>

<body>

<div class="header">
Services
</div>

<div class="container">

<div class="card" onclick="showPopup()">
<div class="title">🧪 Account Testing</div>
<div class="arrow">›</div>
</div>

<div class="card" onclick="location.href='fund.html'">
<div class="title">💸 Fund Change</div>
<div class="arrow">›</div>
</div>

<div class="card" onclick="showPopup()">
<div class="title">📄 Statement</div>
<div class="arrow">›</div>
</div>

<div class="card" onclick="location.href='checkstatus.html'">
<div class="title">📊 Check Status</div>
<div class="arrow">›</div>
</div>

<div class="card" onclick="location.href='share.html'">
<div class="title">🔗 Share Link</div>
<div class="arrow">›</div>
</div>

</div>
</div>

<button onclick="history.back()" class="back-btn">
⬅ Back
</button>

<style>
.back-btn{
width:90%;
max-width:350px;
display:block;
margin:20px auto;
padding:14px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
background:#ff9800;
color:white;
cursor:pointer;
}

.back-btn:hover{
background:#e68900;
}
</style>
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);justify-content:center;align-items:center;z-index:9999;">

<div style="background:#fff;width:320px;padding:20px;border-radius:15px;text-align:center;">

<h2 style="color:red;">Activation Required</h2>

<p style="color:#333;">
Active karne ke liye account activate karein.
</p>

<button onclick="location.href='deposit.html'" style="width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:bold;">
Active
  </button>

<button onclick="closePopup()" style="width:100%;padding:12px;background:#777;color:#fff;border:none;border-radius:8px;font-size:18px;margin-top:10px;">
Close
</button>

</div>

</div>

<script>
function showPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
  </script>
</body>
  </html>
</body>
</html>
