<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Global Pay</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="profile-page">

<div class="profile-header">
<a href="home.html" class="back-btn">←</a>
<h2>My Profile</h2>
</div>

<div class="profile-card">

<div class="profile-photo">
<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
</div>

<h2>User</h2>
  <button id="googleSignInBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Sign in with Google
  </button>

<p>User ID : GP123456</p>

<div class="profile-info">
<p>📱 Mobile : +91 XXXXXXXXXX</p>
<p>💰 Wallet Balance : ₹0.00</p>
<p>👥 Total Team : 0</p>
<p>💵 Total Income : ₹0.00</p>
</div>

<button onclick="location.href='editprofile.html'">Edit Profile</button>

<button onclick="location.href='changepassword.html'">Change Password</button>

<button onclick="location.href='bank.html'">Bank / UPI Details</button>

<button onclick="location.href='support.html'">Help & Support</button>

<button onclick="location.href='index.html'" class="logout-btn">Logout</button>

</div>

</div>

  <script type="module" src="firebase-config.js"></script>

<script type="module">
import { auth, provider } from "./firebase-config.js";
import {
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const btn = document.getElementById("googleSignInBtn");

btn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.querySelector("h2").innerText = user.displayName;
    document.querySelector(".profile-photo img").src = user.photoURL;
    btn.style.display = "none";
  } else {
    btn.style.display = "block";
  }
});
</script>
</body>
</html>
