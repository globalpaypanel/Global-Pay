<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Account</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1f2937;
    padding:25px;
    border-radius:15px;
    width:320px;
    text-align:center;
    color:#fff;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#16a34a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#msg{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">
    <h2>Activate Account</h2>

    <input type="text" id="code" placeholder="Enter Activation Code">

    <button onclick="checkCode()">Activate</button>

    <p id="msg"></p>
</div>

<script>
function checkCode() {

    let code = document.getElementById("code").value.trim();

    if (code === "386282") {
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "editprofile.html";
        window.location.href = next;
    } else {
        document.getElementById("msg").innerHTML = "❌ Invalid Activation Code";
        document.getElementById("msg").style.color = "red";
    }

    }
</script>

</body>
</html>
